app = "compta-app"

[build]
  # use the Dockerfile already in the repository
  dockerfile = "Dockerfile"

[env]
  # Do not store production secrets in git-tracked files.
  # Set DATABASE_URL using `fly secrets set` if you deploy on Fly again.

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
